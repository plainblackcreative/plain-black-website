<style>
:root{
  --cream:#f6f5f1;
  --cream-warm:#faf8f3;
  --cream-deep:#efebe2;
  --ink:#1a202c;
  --ink-soft:#2d3748;

  --rose:#e2a7ac;
  --rose-deep:#c88791;
  --peach:#ecccae;

  --taupe:#a8867b;
  --line:rgba(26,32,44,0.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:'Nunito',sans-serif;
  background:var(--cream);
  color:var(--ink);
  line-height:1.6;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  font-synthesis:none;
  font-weight:500;
}
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 15% -10%, rgba(226,167,172,0.18), transparent 55%),
    radial-gradient(ellipse at 90% 110%, rgba(236,204,174,0.16), transparent 55%);
  pointer-events:none;
  z-index:0;
}
h1,h2,h3{font-family:'Cormorant',serif;line-height:1.05}

.wrap{
  max-width:560px;
  margin:0 auto;
  padding:36px 22px 80px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
  z-index:1;
}

/* Brand header */
.brand{
  text-align:center;
  margin-bottom:30px;
}
.brand-logo{
  display:block;
  margin:0 auto;
  max-width:240px;
  width:100%;
  height:auto;
}
.brand-sub{
  font-family:'Nunito',sans-serif;
  font-size:0.7rem;
  letter-spacing:0.24em;
  text-transform:uppercase;
  color:var(--muted);
  margin-top:8px;
  font-weight:600;
}
.brand-divider{
  width:42px;
  height:1px;
  background:var(--ink);
  margin:14px auto 0;
  opacity:0.4;
}

/* Welcome */
.welcome{
  text-align:center;
  padding:18px 0 28px;
}
.welcome h1{
  font-family:'Cormorant',serif;
  font-style:italic;
  font-weight:500;
  font-size:clamp(2.8rem, 8vw, 4rem);
  color:var(--ink);
  margin-bottom:20px;
  letter-spacing:-0.005em;
}
.welcome h1 .accent{color:var(--rose-deep);font-weight:600}
.welcome .lede{
  font-family:'Nunito',sans-serif;
  font-size:1.05rem;
  color:var(--ink-soft);
  margin-bottom:32px;
  line-height:1.6;
  max-width:440px;
  margin-left:auto;
  margin-right:auto;
  font-weight:500;
}
.welcome .lede em{color:var(--rose-deep);font-style:italic;font-family:'Cormorant',serif;font-weight:600;font-size:1.05em}

/* Card */
.card{
  background:var(--cream-warm);
  border:1px solid var(--line);
  border-radius:16px;
  padding:32px 24px;
  box-shadow:0 1px 0 rgba(26,32,44,0.02), 0 4px 24px rgba(26,32,44,0.04);
}

/* Question */
.q-meta{
  font-family:'Nunito',sans-serif;
  font-size:0.66rem;
  letter-spacing:0.24em;
  text-transform:uppercase;
  color:var(--rose-deep);
  font-weight:700;
  margin-bottom:14px;
}
.q-title{
  font-family:'Cormorant',serif;
  font-style:italic;
  font-weight:500;
  font-size:1.75rem;
  margin-bottom:24px;
  color:var(--ink);
  line-height:1.15;
}
.q-options{
  display:grid;
  gap:10px;
}
.q-option{
  padding:14px 18px;
  background:var(--cream);
  border:1px solid var(--line);
  border-radius:12px;
  cursor:pointer;
  color:var(--ink-soft);
  font-family:'Nunito',sans-serif;
  font-size:0.98rem;
  font-weight:500;
  transition:background 0.15s, border-color 0.15s, color 0.15s;
  text-align:left;
  width:100%;
  display:flex;
  align-items:center;
  gap:12px;
}
.q-option:hover{
  background:#fff;
  border-color:var(--rose);
  color:var(--ink);
}
.q-option.selected{
  background:rgba(226,167,172,0.18);
  border-color:var(--rose);
  color:var(--ink);
  font-weight:600;
}
.q-option.disabled{pointer-events:none}
.q-option:focus-visible{
  outline:2px solid var(--rose-deep);
  outline-offset:2px;
}
.q-option-marker{
  width:18px;height:18px;
  border-radius:50%;
  border:1.5px solid rgba(26,32,44,0.18);
  flex-shrink:0;
  position:relative;
  transition:border-color 0.15s;
  background:#fff;
}
.q-option.selected .q-option-marker{border-color:var(--rose-deep)}
.q-option.selected .q-option-marker::after{
  content:'';
  position:absolute;
  inset:3px;
  background:var(--rose-deep);
  border-radius:50%;
}

/* Fit pulse */
.fit-pulse-wrap{margin-top:30px}
.fit-pulse{
  height:5px;
  background:rgba(226,167,172,0.18);
  border-radius:3px;
  position:relative;
  overflow:hidden;
}
.fit-pulse-fill{
  position:absolute;
  left:0;top:0;bottom:0;
  width:0%;
  background:linear-gradient(90deg, var(--peach-deep), var(--rose));
  border-radius:3px;
  transition:width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.fit-pulse-fill::after{
  content:'';
  position:absolute;
  right:-2px;top:-3px;bottom:-3px;
  width:14px;
  background:radial-gradient(circle, var(--rose-deep), transparent 70%);
  animation:fitPulse var(--pulse-duration, 1.5s) ease-in-out infinite;
  opacity:0.85;
}
@keyframes fitPulse{
  0%,100%{transform:scaleX(1);opacity:0.7}
  50%{transform:scaleX(1.8);opacity:1}
}
.fit-pulse-label{
  font-family:'Cormorant',serif;
  font-style:italic;
  font-size:0.95rem;
  color:var(--muted);
  text-align:center;
  margin-top:9px;
  letter-spacing:0;
  font-weight:500;
}

/* Buttons */
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:14px 22px;
  border-radius:999px;
  font-family:'Nunito',sans-serif;
  font-weight:700;
  font-size:0.95rem;
  letter-spacing:0.01em;
  cursor:pointer;
  border:none;
  text-decoration:none;
  transition:all 0.15s;
  line-height:1;
}
.btn-primary{

}
.btn-primary:hover{background:#b87480;transform:translateY(-1px)}
.btn-secondary{
  background:transparent;
  border:1.5px solid var(--ink);
  color:var(--ink);
}
.btn-secondary:hover{
  background:var(--ink);
  color:var(--cream);
}
.btn-large{padding:16px 28px;font-size:1rem;width:100%}
.btn:focus-visible{outline:2px solid var(--rose-deep);outline-offset:3px}

/* Progress dots */
.progress{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-bottom:26px;
}
.progress-dot{
  width:7px;height:7px;
  border-radius:50%;
  background:rgba(26,32,44,0.12);
  transition:background 0.2s, transform 0.2s;
}
.progress-dot.active{background:var(--rose-deep);transform:scale(1.4)}
.progress-dot.done{background:rgba(226,167,172,0.6)}

/* Result */

  color:var(--muted);
  text-align:center;
  margin-bottom:12px;
  font-weight:500;
}
.result-title{
  font-family:'Cormorant',serif;
  font-style:italic;
  font-weight:500;
  font-size:clamp(2.2rem, 6vw, 3rem);
  text-align:center;
  margin-bottom:20px;
  line-height:1.1;
  letter-spacing:-0.005em;
}
.result-title.strong{color:var(--rose-deep)}
.result-title.maybe{color:var(--peach-deep)}
.result-title.bad{color:var(--taupe)}
.result-body{
  font-family:'Nunito',sans-serif;
  font-size:1rem;
  color:var(--ink-soft);
  line-height:1.65;
  margin-bottom:22px;
  text-align:center;
  font-weight:500;
}
.result-body strong{color:var(--ink);font-weight:700}
.result-callout{
  background:var(--cream);
  border:1px solid var(--line);
  border-radius:12px;
  padding:16px 18px;
  margin-bottom:12px;
}
.result-callout-title{
  font-family:'Nunito',sans-serif;
  color:var(--ink);
  display:block;
  font-size:0.78rem;
  letter-spacing:0.16em;
  text-transform:uppercase;
  font-weight:700;
  margin-bottom:4px;
}
.result-callout p{
  font-family:'Nunito',sans-serif;
  font-size:0.98rem;
  color:var(--ink-soft);
  margin:0;
  line-height:1.5;
  font-weight:500;
}
.result-callout a{color:var(--rose-deep);text-decoration:none;font-weight:700}
.result-callout a:hover{text-decoration:underline}

/* Competitor card */
.competitor-card{
  display:flex;
  justify-content:space-between;
  align-items:center;

  text-decoration:none;

}
.competitor-name{

.competitor-meta{

/* Fit Card (exportable) */
.fit-card-wrap{

  padding-top:24px;

}
.fit-card{
  background:linear-gradient(135deg, var(--cream-warm) 0%, var(--cream-deep) 100%);
  border:1px solid var(--rose);
  border-radius:16px;

  margin-bottom:14px;
  text-align:center;
}
.fit-card-logo{
  display:block;
  margin:0 auto 18px;
  max-width:200px;
  width:100%;

}
.fit-card-score{
  font-family:'Cormorant',serif;
  font-style:italic;
  font-weight:500;
  font-size:clamp(2rem, 6vw, 2.6rem);
  line-height:1.1;
  color:var(--rose-deep);
  padding:0 8px;
}
.fit-card-score.maybe{color:var(--peach-deep)}
.fit-card-score.bad{color:var(--taupe)}
.fit-card-score-label{
  font-family:'Nunito',sans-serif;
  font-size:0.7rem;
  letter-spacing:0.24em;

.fit-card-verdict{

/* Footer */
.foot{
  text-align:center;
  margin-top:auto;
  padding-top:42px;

@keyframes fadeIn{to{opacity:1}}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none !important;transition:none !important}
}
</style>

<body>

<div class="wrap" id="app"></div>

<script>
// =====================================================================
// CONFIG — fill these in before going live for the photographer.
// =====================================================================
const CONFIG = {
  photographerName: 'Anita Pitu Photography',
  photographerTagline: 'Documentary wedding photography',
  phone: '[ANITA PHONE]',
  phoneTel: '[ANITA PHONE TEL]',                 // e.g. "+64212345678"
  calendlyLink: '[ANITA CALENDLY OR BOOKING URL]',
  guideLink: '[MAYBE-FIT GUIDE URL]',
  region: 'New Zealand',
  competitors: [
    { name: '[COMPETITOR 1 NAME]', meta: '[@handle or website]', link: '[COMPETITOR 1 URL]' },
    { name: '[COMPETITOR 2 NAME]', meta: '[@handle or website]', link: '[COMPETITOR 2 URL]' },
    { name: '[COMPETITOR 3 NAME]', meta: '[@handle or website]', link: '[COMPETITOR 3 URL]' }
  ]
};

// =====================================================================
// QUESTIONS — scoring tuned per question; total max = 10.
// Tweak with Anita once her tier thresholds are confirmed.
// =====================================================================
const QUESTIONS = [
  {
    title: "Whats your photography budget?",
    options: [
      { text: "Under $2k", score: 0 },
      { text: "$2k to $3k", score: 0 },
      { text: "$3k to $5k", score: 1 },
      { text: "$5k or more", score: 2 }
    ]
  },
  {
    title: "Which style speaks to you?",
    options: [
      { text: "Documentary, candid, story-led", score: 2 },
      { text: "Posed and editorial", score: 1 },
      { text: "Romantic and soft", score: 2 },
      { text: "A mix of everything", score: 1 }
    ]
  },
  {
    title: "Whens the wedding?",
    options: [
      { text: "In the next 3 months", score: 1 },
      { text: "3 to 6 months away", score: 2 },
      { text: "6 to 12 months away", score: 2 },
      { text: "More than a year away", score: 1 }
    ]
  },
  {
    title: "Whos involved in the decision?",
    options: [
      { text: "Just me, I decide", score: 2 },
      { text: "Me and my partner", score: 2 },
      { text: "The whole family", score: 0 },
      { text: "We have a wedding planner", score: 1 }
    ]
  },
  {
    title: "What matters most about the photos?",
    options: [
      { text: "The story of the day", score: 2 },
      { text: "Beautiful posed shots", score: 1 },
      { text: "Both, equally", score: 2 },
      { text: "Not sure yet", score: 1 }
    ]
  }
];

const MAX_SCORE = QUESTIONS.length * 2; // 10

// =====================================================================
// STATE
// =====================================================================
const state = {
  step: 0,
  answers: [],
  score: 0
};

// =====================================================================
// RENDER
// =====================================================================
function render() {
  const app = document.getElementById('app');
  if (state.step === 0) app.innerHTML = renderWelcome();
  else if (state.step <= QUESTIONS.length) {
    app.innerHTML = renderQuestion(state.step - 1);
    attachQuestionHandlers();
  } else {
    app.innerHTML = renderResult();
  }
  window.scrollTo({ top: 0, behavior: 'auto' });
}

function brandHeader() {
  return `
    <div class="brand">
      <img class="brand-logo" src="/assets/clients/anita-pitu/wordmark.png" alt="${CONFIG.photographerName}" width="240" height="84">
      <div class="brand-sub">${CONFIG.photographerTagline}</div>
      <div class="brand-divider"></div>
    </div>
  `;
}

function progressDots() {
  let dots = '';
  for (let i = 1; i <= QUESTIONS.length; i++) {
    let cls = 'progress-dot';
    if (i < state.step) cls += ' done';
    else if (i === state.step) cls += ' active';
    dots += `<div class="${cls}" aria-hidden="true"></div>`;
  }
  return `<div class="progress" role="progressbar" aria-valuenow="${state.step}" aria-valuemin="0" aria-valuemax="${QUESTIONS.length}" aria-label="Question progress">${dots}</div>`;
}

function pbFooter() {
  return `<div class="foot">Built by <a href="https://www.plainblackcreative.com" target="_blank" rel="noopener">PlainBlack</a> · a Fit Filter tool</div>`;
}

function renderWelcome() {
  return `
    ${brandHeader()}
    <div class="welcome fade-in">
      <h1>Should we <span class="accent">talk yet?</span></h1>
      <p class="lede">Ive always been a sucker for a love story. Five quick questions to find out if were a good fit for your day. <em>No email required.</em> No sales pitch waiting on the other side, either.</p>
      <button class="btn btn-primary btn-large" onclick="start()" type="button">Lets do this</button>
    </div>
    ${pbFooter()}
  `;
}

function renderQuestion(idx) {
  const q = QUESTIONS[idx];
  const fitPercent = computeFitPercent();
  const fitLabel = computeFitLabel();
  const pulseDuration = computePulseDuration();

  const opts = q.options.map((o, i) => `
    <button class="q-option" data-score="${o.score}" data-idx="${i}" type="button">
      <span class="q-option-marker" aria-hidden="true"></span>
      <span>${o.text}</span>
    </button>
  `).join('');

  return `
    ${brandHeader()}
    ${progressDots()}
    <div class="card fade-in">
      <div class="q-meta">Question ${idx + 1} of ${QUESTIONS.length}</div>
      <div class="q-title">${q.title}</div>
      <div class="q-options" role="radiogroup" aria-label="${q.title}">${opts}</div>
      <div class="fit-pulse-wrap">
        <div class="fit-pulse" aria-hidden="true">
          <div class="fit-pulse-fill" style="width:${fitPercent}%;--pulse-duration:${pulseDuration}s"></div>
        </div>
        <div class="fit-pulse-label">${fitLabel}</div>
      </div>
    </div>
    ${pbFooter()}
  `;
}

function attachQuestionHandlers() {
  const buttons = document.querySelectorAll('.q-option');
  buttons.forEach((btn) => {
    btn.addEventListener('click', () => {
      if (btn.classList.contains('disabled')) return;
      buttons.forEach((b) => b.classList.add('disabled'));
      btn.classList.add('selected');

      const score = parseInt(btn.dataset.score, 10);
      const idx = parseInt(btn.dataset.idx, 10);

      state.answers[state.step - 1] = { score, idx };
      state.score = state.answers.reduce((sum, a) => sum + (a ? a.score : 0), 0);

      const fill = document.querySelector('.fit-pulse-fill');
      const label = document.querySelector('.fit-pulse-label');
      if (fill) {
        fill.style.width = computeFitPercent() + '%';
        fill.style.setProperty('--pulse-duration', computePulseDuration() + 's');
      }
      if (label) label.textContent = computeFitLabel();

      try { gtag('event', 'fit_screener_answer', { step: state.step, score }); } catch (e) {}

      setTimeout(() => {
        state.step++;
        render();
      }, 460);
    });

    btn.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        btn.click();
      }
    });
  });
}

function computeFitPercent() {
  return Math.min(100, (state.score / MAX_SCORE) * 100);
}

function computePulseDuration() {
  const pct = computeFitPercent() / 100;
  return (2.0 - pct * 1.4).toFixed(2);
}

function fitLabel(score) {
  if (score >= 9) return 'Heck yes';
  if (score >= 7) return 'Looking like a yes';
  if (score >= 5) return 'A definite maybe';
  if (score >= 3) return 'Probably not us, lovely';
  return 'Different vibes entirely';
}

function computeFitLabel() {
  const answered = state.answers.filter((a) => a).length;
  if (answered === 0) return 'just warming up';
  return fitLabel(state.score).toLowerCase();
}

// =====================================================================
// RESULT
// =====================================================================
function renderResult() {
  const score = state.score;
  if (score >= 7) return renderStrongFit(score);
  if (score >= 4) return renderMaybeFit(score);
  return renderBadFit(score);
}

function renderStrongFit(score) {
  try { gtag('event', 'fit_screener_result', { result: 'strong', score }); } catch (e) {}
  return `
    ${brandHeader()}
    <div class="card fade-in">
      <div class="result-eyebrow">${fitLabel(score)}</div>
      <h2 class="result-title strong">Heck yes, lets talk.</h2>
      <p class="result-body">From your five answers, Im reading <strong>${fitLabel(score).toLowerCase()}</strong>. Next step is a 20-minute phone chat to make sure our styles match your day.</p>

      <div class="result-callout">
        <span class="result-callout-title">Direct line</span>
        <p><a href="tel:${CONFIG.phoneTel}">${CONFIG.phone}</a></p>
      </div>

      <a class="btn btn-primary btn-large" href="${CONFIG.calendlyLink}" target="_blank" rel="noopener">Book the 20-min call</a>

      ${fitCardBlock(score, 'strong', 'Heck yes, lets talk.')}
      <div class="restart-row"><button class="btn btn-secondary btn-large" onclick="restart()" type="button">Start again</button></div>
    </div>
    ${pbFooter()}
  `;
}

function renderMaybeFit(score) {
  try { gtag('event', 'fit_screener_result', { result: 'maybe', score }); } catch (e) {}
  return `
    ${brandHeader()}
    <div class="card fade-in">
      <div class="result-eyebrow">${fitLabel(score)}</div>
      <h2 class="result-title maybe">Lets figure a few things out first.</h2>
      <p class="result-body">From your five answers, Im reading <strong>${fitLabel(score).toLowerCase()}</strong>. Before talking to ANY wedding photographer, here are three things to figure out so the conversation isnt a coin flip.</p>

      <div class="result-callout">
        <span class="result-callout-title">Get the guide</span>
        <p>Three pages, plain English, no email required.</p>
      </div>

      <a class="btn btn-primary btn-large" href="${CONFIG.guideLink}" target="_blank" rel="noopener">Download the guide</a>

      ${fitCardBlock(score, 'maybe', 'Lets figure a few things out first.')}
      <div class="restart-row"><button class="btn btn-secondary btn-large" onclick="restart()" type="button">Start again</button></div>
    </div>
    ${pbFooter()}
  `;
}

function renderBadFit(score) {
  try { gtag('event', 'fit_screener_result', { result: 'bad', score }); } catch (e) {}
  const comps = CONFIG.competitors.map((c) => `
    <a class="result-callout" href="${c.link}" target="_blank" rel="noopener" style="text-decoration:none;display:block">
      <div class="competitor-card">
        <div>
          <div class="competitor-name">${c.name}</div>
          <div class="competitor-meta">${c.meta}</div>
        </div>
        <div class="competitor-arrow" aria-hidden="true">→</div>
      </div>
    </a>
  `).join('');

  return `
    ${brandHeader()}
    <div class="card fade-in">
      <div class="result-eyebrow">${fitLabel(score)}</div>
      <h2 class="result-title bad">Im probably not your photographer, lovely.</h2>
      <p class="result-body">From your five answers, Im reading <strong>${fitLabel(score).toLowerCase()}</strong>. Thats not a problem at all. Here are three ${CONFIG.region} photographers I love whod be a beautiful match for your day.</p>

      ${comps}

      <p class="result-body" style="margin-top:24px;font-size:0.9rem;color:var(--muted)">No email captured. No followup. Go book one of these, theyre all wonderful.</p>

      ${fitCardBlock(score, 'bad', 'Different fit, not no fit.')}
      <div class="restart-row"><button class="btn btn-secondary btn-large" onclick="restart()" type="button">Start again</button></div>
    </div>
    ${pbFooter()}
  `;
}

function fitCardBlock(score, kind, verdict) {
  return `
    <div class="fit-card-wrap">
      <div class="fit-card" id="fit-card">
        <img class="fit-card-logo" src="/assets/clients/anita-pitu/wordmark.png" alt="${CONFIG.photographerName}" width="200" height="70" crossorigin="anonymous">

        <div class="fit-card-score ${kind}">${fitLabel(state.score)}</div>
        <div class="fit-card-score-label">The read</div>
        <div class="fit-card-verdict">${verdict}</div>
      </div>
      <button class="btn btn-secondary" onclick="downloadFitCard()" type="button">Save the Fit Card</button>
    </div>
  `;
}

// =====================================================================
// ACTIONS
// =====================================================================
function start() {
  state.step = 1;
  try { gtag('event', 'fit_screener_start'); } catch (e) {}
  render();
}

function restart() {
  state.step = 0;
  state.answers = [];
  state.score = 0;
  render();
}

async function downloadFitCard() {
  const card = document.getElementById('fit-card');
  if (!card || !window.html2canvas) {
    alert('Hold on, still loading.');
    return;
  }
  try {
    const canvas = await window.html2canvas(card, {
      backgroundColor: null,
      scale: 2,
      useCORS: true,
      logging: false
    });
    const link = document.createElement('a');
    link.download = `fit-card-${state.score}-of-${MAX_SCORE}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    try { gtag('event', 'fit_screener_card_download', { score: state.score }); } catch (e) {}
  } catch (err) {
    console.warn('Fit Card export failed:', err);
    alert('Could not save the card. Try a screenshot instead.');
  }
}

// =====================================================================
// INIT
// =====================================================================
window.start = start;
window.restart = restart;
window.downloadFitCard = downloadFitCard;
render();
</script>

</body>
</html>
