    options: [
      { text: "Under $2k", score: 0, hardFloor: 'budget',
        callout: { tier:'bridezilla', label:'Bridezilla', icon:'⚠', note:'Below tier floor, refer out, save the call.' } },
      { text: "$2k to $3k", score: 1,
        callout: { tier:'pro', label:'Pro', icon:'📸', note:'Below ideal, maybe-path. Maybe a smaller package.' } },
      { text: "$3k to $5k", score: 2,
        callout: { tier:'mate', label:'Mate', icon:'😎', note:'Solid mid tier, likely book.' } },
      { text: "$5k or more", score: 3,
        callout: { tier:'bff', label:'BFF', icon:'💚', note:'Premium tier, easy yes.' } }
    ]
  },
  {
    title: "Which of these sounds most like you?",
    options: [
      { text: "Honestly, a new friend to share the day with", score: 3,
        callout: { tier:'bff', label:'BFF', icon:'💚', note:'Did we just become best friends?' } },
      { text: "Someone fun who really gets us", score: 2,
        callout: { tier:'mate', label:'Mate', icon:'😎', note:'Easy chemistry, smooth day.' } },
      { text: "The best photographer I can afford", score: 1,
        callout: { tier:'pro', label:'Pro', icon:'📸', note:'Quality first, professional distance. Workable.' } },
      { text: "Someone who'll do exactly what I say", score: 0, hardFloor: 'voice',
        callout: { tier:'bridezilla', label:'Bridezilla', icon:'⚠', note:"Oh sorry I just remembered I'm really sick that day." } }
    ]
  },
  {
    title: "Which photo style speaks to you?",
    options: [
      { text: "Documentary, candid moments, real emotions", score: 3,
        callout: { tier:'bff', label:'BFF', icon:'💚', note:'Her bread and butter.' } },
      { text: "Romantic and dreamy, soft and ethereal", score: 2,
        callout: { tier:'mate', label:'Mate', icon:'😎', note:'Also her wheelhouse, slightly different leaning.' } },
      { text: "Editorial, posed, magazine-style portraits", score: 0, hardFloor: 'style',
        callout: { tier:'pass', label:'Pass', icon:'↗', note:'Wrong style fit, not bridezilla. Refer to an editorial shooter.' } },
      { text: "A bit of everything", score: 1,
        callout: { tier:'pro', label:'Pro', icon:'📸', note:'Hedge. Ask follow-up about emphasis.' } }
    ]
  },
  {
    title: "What's the day going to feel like?",
    options: [
      { text: "Relaxed, garden-party, fun energy", score: 3,
        callout: { tier:'bff', label:'BFF', icon:'💚', note:'Documentary gold.' } },
      { text: "Intimate, low-key, just our people", score: 2,
        callout: { tier:'mate', label:'Mate', icon:'😎', note:'Quiet documentary, also great.' } },
      { text: "Big, bold, dance-floor-heavy", score: 1,
        callout: { tier:'pro', label:'Pro', icon:'📸', note:'Energy match, but more wrangling on the day.' } },
      { text: "Tightly scheduled, every minute mapped", score: 0,
        callout: { tier:'bridezilla', label:'Bridezilla', icon:'⚠', note:'Perfectionist flag, documentary may clash.' } }
    ]
  },
  {
    title: "How fast can you make a yes-or-no on a photographer?",
    options: [
      { text: "Already decided, just need to book", score: 3,
        callout: { tier:'bff', label:'BFF', icon:'💚', note:'Hot lead, close quickly.' } },
      { text: "Within a week of meeting", score: 2,
        callout: { tier:'mate', label:'Mate', icon:'😎', note:'Decisive, book the call.' } },
      { text: "Couple of weeks, comparing a few", score: 1,
        callout: { tier:'pro', label:'Pro', icon:'📸', note:'Standard pace, standard followup.' } },
      { text: "When the right one feels right", score: 0,
        callout: { tier:'bridezilla', label:'Bridezilla', icon:'⚠', note:'Ghost risk. May vanish or take forever.' } }
    ]
  }
];

// Dynamic max so retuning scores never desyncs the denominator.
const MAX_SCORE = QUESTIONS.reduce((sum, q) => sum + Math.max.apply(null, q.options.map((o) => o.score)), 0);

// On-brand caption shown under the pulse bar per question.
// Keeps the customer flow free of any ranking leak.
const CAPTIONS = [
  "promise, no judgement here",
  "this ones the most telling",
  "no wrong answer here",
  "paint me the picture",
  "almost there, queen"
];

// =====================================================================
// STATE
// =====================================================================
const state = {
  step: 0,
  answers: [],
  score: 0
};

// =====================================================================
// DEMO MODE — currently always on (today is build/demo day).
// Reveals BFF/Mate/Pro/Bridezilla tier + translation under each answer.
// To hide for customer mode later, change to:
//   const DEMO_MODE = new URLSearchParams(location.search).has('demo');
// =====================================================================
const DEMO_MODE = true;

// =====================================================================
// RENDER
// =====================================================================
function render() {
  const app = document.getElementById('app');
  let body;
  if (state.step === 0) body = renderWelcome();
  else if (state.step <= QUESTIONS.length) body = renderQuestion(state.step - 1);
  else body = renderResult();
  app.innerHTML = body;
  if (state.step >= 1 && state.step <= QUESTIONS.length) attachQuestionHandlers();
  window.scrollTo({ top: 0, behavior: 'auto' });
}

function brandHeader() {
  return `
    <div class="brand">
      <img class="brand-logo" src="/assets/clients/anita-pitu/wordmark.png" alt="${CONFIG.photographerName}" width="240" height="84">
      <div class="brand-sub">${CONFIG.photographerTagline}</div>
      <div class="brand-divider"></div>
    </div>
  `;
}

function progressDots() {
  let dots = '';
  for (let i = 1; i <= QUESTIONS.length; i++) {
    let cls = 'progress-dot';
    if (i < state.step) cls += ' done';
    else if (i === state.step) cls += ' active';
    dots += `<div class="${cls}" aria-hidden="true"></div>`;
  }
  return `<div class="progress" role="progressbar" aria-valuenow="${state.step}" aria-valuemin="0" aria-valuemax="${QUESTIONS.length}" aria-label="Question progress">${dots}</div>`;
}

function pbFooter() {
  return `<div class="foot">Built by <a href="https://www.plainblackcreative.com" target="_blank" rel="noopener">PlainBlack</a> · a Fit Filter tool</div>`;
}

function renderWelcome() {
  return `
    ${brandHeader()}
    <div class="welcome fade-in">
      <h1>Should we <span class="accent">talk yet?</span></h1>
      <p class="lede">Hey, queen. I'm not the right photographer for every couple, but when it's a match, you just know. Five quick questions to find out if we're a good fit for your day. <em>No email required.</em> No sales pitch waiting on the other side, either.</p>
      <button class="btn btn-primary btn-large" onclick="start()" type="button">Let's do this</button>
    </div>
    ${pbFooter()}
  `;
}

function renderQuestion(idx) {
  const q = QUESTIONS[idx];
  const fitPercent = computeFitPercent();
  const sectionCaption = CAPTIONS[idx] || '';
  const pulseDuration = computePulseDuration();

  const opts = q.options.map((o, i) => `
    <button class="q-option" data-score="${o.score}" data-idx="${i}" type="button">
      <span class="q-option-marker" aria-hidden="true"></span>
      <span>${o.text}</span>
    </button>
  `).join('');

  return `
    ${brandHeader()}
    ${progressDots()}
    <div class="card fade-in">
      <div class="q-meta">Question ${idx + 1} of ${QUESTIONS.length}</div>
      <div class="q-title">${q.title}</div>
      <div class="q-options" role="radiogroup" aria-label="${q.title}">${opts}</div>
      <div class="fit-pulse-wrap">
        <div class="fit-pulse" aria-hidden="true">
          <div class="fit-pulse-fill" style="width:${fitPercent}%;--pulse-duration:${pulseDuration}s"></div>
        </div>
        <div class="fit-pulse-label">${sectionCaption}</div>
      </div>
    </div>
    ${pbFooter()}
  `;
}

function attachQuestionHandlers() {
  const buttons = document.querySelectorAll('.q-option');
  buttons.forEach((btn) => {
    btn.addEventListener('click', () => {
      if (btn.classList.contains('disabled')) return;
      buttons.forEach((b) => b.classList.add('disabled'));
      btn.classList.add('selected');

      const score = parseInt(btn.dataset.score, 10);
      const idx = parseInt(btn.dataset.idx, 10);

      const opt = QUESTIONS[state.step - 1].options[idx];
      state.answers[state.step - 1] = { score, idx, hardFloor: opt.hardFloor || null };
      state.score = state.answers.reduce((sum, a) => sum + (a ? a.score : 0), 0);

      const fill = document.querySelector('.fit-pulse-fill');
      if (fill) {
        fill.style.width = computeFitPercent() + '%';
        fill.style.setProperty('--pulse-duration', computePulseDuration() + 's');
      }

      try { gtag('event', 'fit_screener_answer', { step: state.step, score }); } catch (e) {}

      setTimeout(() => {
        state.step++;
        render();
      }, 460);
    });

    btn.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        btn.click();
      }
    });
  });
}

function computeFitPercent() {
  // Progress-based, not score-based. Customer never sees rank leak.
  const answered = state.answers.filter((a) => a).length;
  return Math.min(100, (answered / QUESTIONS.length) * 100);
}

function computePulseDuration() {
  // Speeds up gently with progress.
  const pct = computeFitPercent() / 100;
  return (1.8 - pct * 1.0).toFixed(2);
}

function hasHardFloor() {
  return state.answers.some((a) => a && a.hardFloor);
}

function whichHardFloor() {
  const a = state.answers.find((x) => x && x.hardFloor);
  return a ? a.hardFloor : null;
}

// Tier and label thresholds tuned for max=15 (5 questions x 0/1/2/3 spread).
// Realistic couples land mid-band; "Heck yes" requires near-perfect picks.
function fitTier() {
  if (hasHardFloor()) return 'bad';
  const s = state.score;
  if (s >= 11) return 'strong';
  if (s >= 6) return 'maybe';
  return 'bad';
}

function fitLabel() {
  if (hasHardFloor()) return 'Different vibes entirely';
  const s = state.score;
  if (s >= 13) return 'Heck yes';
  if (s >= 11) return 'Looking like a yes';
  if (s >= 6) return 'A definite maybe';
  if (s >= 3) return 'Probably not us, lovely';
  return 'Different vibes entirely';
}

function computeFitLabel() {
  const answered = state.answers.filter((a) => a).length;
  if (answered === 0) return 'just warming up';
  return fitLabel().toLowerCase();
}

// =====================================================================
// ADMIN DEBRIEF — option-by-option breakdown shown on results page.
// Visible while DEMO_MODE is true (today is build/demo day).
// =====================================================================
function renderAnswerSummary() {
  if (!DEMO_MODE) return '';

  const reads = state.answers.map((a, i) => {
    if (!a) return '';
    const q = QUESTIONS[i];
    const opt = q.options[a.idx];
    const c = opt.callout;
    return `
      <div class="rs-mini-read">
        <span class="rs-mini-q">Q${i + 1}</span>
        <span class="rs-mini-a">${opt.text}</span>
        <span class="rs-mini-tier tier-${c.tier}">${c.label}</span>
      </div>
    `;
  }).join('');

  const floor = whichHardFloor();
  const tier = fitTier();
  const floorBit = floor ? ` · <span class="rs-floor">Hard floor: ${floor}</span>` : '';

  // Bridezilla risk image: 1 = BFF / Heck yes, 5 = full Bridezilla.
  // Only the voice floor ("do exactly what I say") is a true bridezilla signal —
  // style/budget floors are wrong-fit, not bad-behavior, so let those score normally.
  // Buckets tuned for max=15 to match fitTier/fitLabel thresholds.
  let riskIdx;
  if (floor === 'voice') riskIdx = 5;
  else if (state.score >= 13) riskIdx = 1;
  else if (state.score >= 11) riskIdx = 2;
  else if (state.score >= 8) riskIdx = 3;
  else if (state.score >= 4) riskIdx = 4;
  else riskIdx = 5;

  const RISK_LABELS = ['', 'BFF energy', 'Mostly chill', 'Watch it', 'Red flags', 'Full bridezilla'];
  const riskLabel = RISK_LABELS[riskIdx];

  return `
    <div class="result-summary">
      <div class="rs-title">For Anita's eyes only · customer doesn't see this</div>
      <div class="rs-card">
        <img class="rs-image" src="/assets/clients/anita-pitu/risk-${riskIdx}.png" alt="" onerror="this.style.display='none'">
        <div class="rs-overlay-top">
          <div class="rs-risk-meta">Bridezilla risk · ${riskIdx} of 5</div>
          <div class="rs-risk-title">${riskLabel}</div>
        </div>
        <div class="rs-overlay-bottom">
          ${reads}
        </div>
      </div>
      <div class="rs-total">
        Total <strong>${state.score} / ${MAX_SCORE}</strong> · Tier <strong>${tier}</strong>${floorBit}
      </div>
    </div>
  `;
}

// =====================================================================
// RESULT
// =====================================================================
function renderResult() {
  const tier = fitTier();
  if (tier === 'strong') return renderStrongFit();
  if (tier === 'maybe') return renderMaybeFit();
  return renderBadFit();
}

function renderStrongFit() {
  const score = state.score;
  const wasBFF = state.answers[1] && state.answers[1].idx === 0; // Q2 first option = the literal BFF answer
  const headline = wasBFF ? 'Did we just become best friends?' : "Heck yes, let's talk.";
  try { gtag('event', 'fit_screener_result', { result: 'strong', score, bff: wasBFF }); } catch (e) {}
  return `
    ${brandHeader()}
    <div class="card fade-in">
      <div class="result-eyebrow">${fitLabel()}</div>
      <h2 class="result-title strong">${headline}</h2>
      <p class="result-body">From your five answers, I'm reading <strong>${fitLabel().toLowerCase()}</strong>. Next step is a 20-minute phone chat to make sure our styles match your day.</p>

      <div class="result-callout">
        <span class="result-callout-title">Direct line</span>
        <p><a href="tel:${CONFIG.phoneTel}">${CONFIG.phone}</a></p>
      </div>

      <a class="btn btn-primary btn-large" href="${CONFIG.calendlyLink}" target="_blank" rel="noopener">Book the 20-min call</a>

      ${fitCardBlock('strong', "Hey queen, we're a match.", 'anita, after we matched')}
      <div class="restart-row"><button class="btn btn-secondary btn-large" onclick="restart()" type="button">Start again</button></div>
    </div>
    ${renderAnswerSummary()}
    ${pbFooter()}
  `;
}

function renderMaybeFit() {
  const score = state.score;
  try { gtag('event', 'fit_screener_result', { result: 'maybe', score }); } catch (e) {}
  return `
    ${brandHeader()}
    <div class="card fade-in">
      <div class="result-eyebrow">${fitLabel()}</div>
      <h2 class="result-title maybe">Let's figure a few things out first.</h2>
      <p class="result-body">From your five answers, I'm reading <strong>${fitLabel().toLowerCase()}</strong>. Before talking to ANY wedding photographer, here are three things to figure out so the conversation isn't a coin flip.</p>

      <div class="result-callout">
        <span class="result-callout-title">Get the guide</span>
        <p>Three pages, plain English, no email required.</p>
      </div>

      <a class="btn btn-primary btn-large" href="${CONFIG.guideLink}" target="_blank" rel="noopener">Download the guide</a>

      ${fitCardBlock('maybe', 'Almost. So close.', 'anita, hopeful')}
      <div class="restart-row"><button class="btn btn-secondary btn-large" onclick="restart()" type="button">Start again</button></div>
    </div>
    ${renderAnswerSummary()}
    ${pbFooter()}
  `;
}

function renderBadFit() {
  const score = state.score;
  const floor = whichHardFloor();
  const reason = floor || 'low_total';
  try { gtag('event', 'fit_screener_result', { result: 'bad', score, reason }); } catch (e) {}

  let headline, intro, cardQuote;
  if (floor === 'voice') {
    // Literal Bridezilla pick — the signature playful line
    headline = "Oh sorry, I just remembered I'm really sick that day.";
    intro = "Try these guys instead, lovely:";
    cardQuote = "Oh sorry, I'm really sick that day.";
  } else if (floor === 'style') {
    headline = "I'm not the right kind of photographer for this.";
    intro = "Here are three editorial photographers I'd happily send you to:";
    cardQuote = "Different style, that's all.";
  } else if (floor === 'budget') {
    headline = "I'm probably out of your range for this one, lovely.";
    intro = "Here are three ${CONFIG.region} photographers I love in your budget who'd do beautiful work:";
    cardQuote = "Different tier, that's all.";
  } else {
    headline = "I'm probably not your photographer, lovely.";
    intro = "That's not a problem at all. Here are three ${CONFIG.region} photographers I love who'd be a beautiful match:";
    cardQuote = "Not us, with love.";
  }
  // Resolve the ${CONFIG.region} inside the intro strings above
  intro = intro.replace('${CONFIG.region}', CONFIG.region);

  const referralSet = CONFIG.referrals[floor || 'general'] || CONFIG.referrals.general;
  const comps = referralSet.map((c) => `
    <a class="result-callout" href="${c.link}" target="_blank" rel="noopener" style="text-decoration:none;display:block">
      <div class="competitor-card">
        <div>
          <div class="competitor-name">${c.name}</div>
          <div class="competitor-meta">${c.meta}</div>
        </div>
        <div class="competitor-arrow" aria-hidden="true">→</div>
      </div>
    </a>
  `).join('');

  return `
    ${brandHeader()}
    <div class="card fade-in">
      <div class="result-eyebrow">${fitLabel()}</div>
      <h2 class="result-title bad">${headline}</h2>
      <p class="result-body">${intro}</p>

      ${comps}

      <p class="result-body" style="margin-top:24px;font-size:0.9rem;color:var(--muted)">No email captured. No followup. Go book one of these, they're all wonderful.</p>

      ${fitCardBlock('bad', cardQuote, 'anita, with love')}
      <div class="restart-row"><button class="btn btn-secondary btn-large" onclick="restart()" type="button">Start again</button></div>
    </div>
    ${renderAnswerSummary()}
    ${pbFooter()}
  `;
}

function fitCardBlock(kind, quote, attribution) {
  return `
    <div class="fit-card-wrap">
      <div class="fit-card" id="fit-card">
        <img class="fit-card-logo" src="/assets/clients/anita-pitu/wordmark.png" alt="${CONFIG.photographerName}" width="200" height="70" crossorigin="anonymous">
        <div class="fit-card-ornament" aria-hidden="true">✦</div>
        <div class="fit-card-quote ${kind}">${quote}</div>
        <div class="fit-card-attribution">${attribution}</div>
        <div class="fit-card-stamp">anitapituphotography.com</div>
      </div>
      <button class="btn btn-secondary" onclick="downloadFitCard()" type="button">Save the Fit Card</button>
    </div>
  `;
}

// =====================================================================
// ACTIONS
// =====================================================================
function start() {
  state.step = 1;
  try { gtag('event', 'fit_screener_start'); } catch (e) {}
  render();
}

function restart() {
  state.step = 0;
  state.answers = [];
  state.score = 0;
  render();
}

async function downloadFitCard() {
  const card = document.getElementById('fit-card');
  if (!card || !window.html2canvas) {
    alert('Hold on, still loading.');
    return;
  }
  try {
    const canvas = await window.html2canvas(card, {
      backgroundColor: null,
      scale: 2,
      useCORS: true,
      logging: false
    });
    const link = document.createElement('a');
    link.download = `fit-card-${state.score}-of-${MAX_SCORE}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    try { gtag('event', 'fit_screener_card_download', { score: state.score }); } catch (e) {}
  } catch (err) {
    console.warn('Fit Card export failed:', err);
    alert('Could not save the card. Try a screenshot instead.');
  }
}

// =====================================================================
// INIT
// =====================================================================
window.start = start;
window.restart = restart;
window.downloadFitCard = downloadFitCard;
render();
</script>
