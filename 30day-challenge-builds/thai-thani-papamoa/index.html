      </label>
      <div class="cart__email hidden" id="emailWrap">
        <input type="email" id="emailInput" placeholder="you@example.com" inputmode="email">
      </div>

      <div class="cart__send">
        <button class="btn btn-gold btn-block btn-lg" id="sendBtn">
          ${STATE.mode === 'table' ? 'Send to the kitchen' : 'Get my order code'}
        </button>
      </div>
      <div style="margin-top:14px;text-align:center">
        <button class="btn btn-ghost" onclick="go('menu')">Add more items</button>
      </div>
    </div>
  `;

  $$('[data-act]', root).forEach(b => {
    b.addEventListener('click', () => {
      const i = parseInt(b.dataset.i, 10);
      const delta = b.dataset.act === 'inc' ? 1 : -1;
      const newQ = STATE.cart[i].qty + delta;
      updateLineQty(i, newQ);
      go('cart', {replace:true, preserveScroll:true});
    });
  });

  $('#emailToggle', root).addEventListener('change', e => {
    $('#emailWrap', root).classList.toggle('hidden', !e.target.checked);
  });

  $('#sendBtn', root).addEventListener('click', () => {
    const code = genOrderCode();
    STATE.lastOrder = {
      code,
      items: STATE.cart.slice(),
      total: cartTotal(),
      mode: STATE.mode,
      table: STATE.table,
      email: $('#emailToggle', root).checked ? $('#emailInput', root).value : null,
      placedAt: new Date().toISOString(),
    };
    ga('order_sent', {value:cartTotal(), items:cartCount(), mode:STATE.mode});
    markOrderPlaced();   // sets the second-scan marker for this scope
    STATE._upsellShown = 0; // reset upsell counter for next round
    STATE.cart = [];
    persistCart();   // wipes the saved cart for this scope
    go('sent', {replace:true});
  });
});

/* ═════════════════════════════════════════════════════════════════
 * SCREEN: SENT
 * ═════════════════════════════════════════════════════════════════ */
registerScreen('sent', root => {
  const o = STATE.lastOrder;
  if (!o){ go('welcome', {replace:true}); return; }

  const isTable = o.mode === 'table';
  const headline = isTable
    ? `Sent to the kitchen, table ${o.table}`
    : `Show this at the counter`;
  const sub = isTable
    ? `Your server's been notified. They'll pop by to confirm. Just sit back.`
    : `Show the code below at the counter to pay and pick up.`;

  const itemsHTML = o.items.map(line => `
    <div class="item">
      <span class="name">${line.name}<span class="qty">× ${line.qty}</span></span>
      <span>${fmtMoney(line.unitPrice * line.qty)}</span>
    </div>
  `).join('');

  root.innerHTML = `
    <div class="sent">
      <div class="sent__tick">${ico('i-check')}</div>
      <h1>${headline}</h1>
      <p class="lead">${sub}</p>

      <div class="sent__code">
        <div class="label">${isTable ? 'Order ref' : 'Your code'}</div>
        <div class="num">${o.code}</div>
      </div>

      <div class="sent__summary">
        <h3>Your order</h3>
        ${itemsHTML}
        <div class="item" style="border-top:1px solid var(--line);margin-top:6px;padding-top:8px;font-weight:700">
          <span class="name">Total</span>
          <span>${fmtMoney(o.total)}</span>
        </div>
      </div>

      ${o.email ? `<p class="text-muted" style="font-size:13px">A copy has been emailed to ${o.email}</p>` : ''}

      <div class="sent__again">
        <button class="btn btn-ghost btn-block" onclick="STATE.history=[];go('welcome',{replace:true})">Order something else</button>
      </div>
    </div>
  `;

  // Confetti burst
  fireConfetti(root);
});

function fireConfetti(root){
  const colors = ['#c9a25a','#e0bf7c','#5b1019','#d6432a','#3f6b3f'];
  const tick = root.querySelector('.sent__tick');
  if (!tick) return;
  const rect = tick.getBoundingClientRect();
  const cx0 = rect.left + rect.width/2;
  const cy0 = rect.top + rect.height/2;
  for (let i = 0; i < 24; i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.background = colors[i%colors.length];
    c.style.position = 'fixed';
    c.style.left = cx0 + 'px';
    c.style.top = cy0 + 'px';
    c.style.zIndex = 100;
    c.style.setProperty('--cx', (Math.random()*400-200) + 'px');
    c.style.setProperty('--cy', (Math.random()*200+50) + 'px');
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 1500);
  }
}

/* ═════════════════════════════════════════════════════════════════
 * SCREEN: FOLLOWUP (post-meal second scan)
 * ═════════════════════════════════════════════════════════════════ */
registerScreen('followup', root => {
  const isTable = STATE.mode === 'table';
  // Google review link for Thai Thani Papamoa (supplied by the restaurant).
  const reviewURL = 'https://share.google/GIBxWRt2fWsK0ers3';
  const greeting = isTable
    ? `Hope your meal at table ${STATE.table} hit the spot.`
    : `Hope the meal hit the spot.`;
  const callWaiterCard = isTable ? `
    <button class="fu-card" data-act="call">
      <span class="ic"><svg class="icon"><use href="#i-hand"/></svg></span>
      <span class="lbl">Call your server</span>
      <span class="sub">Need something? Tap here, they'll come over.</span>
    </button>` : `
    <button class="fu-card" data-act="codereminder">
      <span class="ic"><svg class="icon"><use href="#i-ticket"/></svg></span>
      <span class="lbl">Show order code</span>
      <span class="sub">Lost it? Pull it back up.</span>
    </button>`;

  root.innerHTML = `
    <div class="followup">
      <div class="followup__head">
        <span class="pill">${isTable ? `Table ${STATE.table}` : 'Counter'}</span>
        <h1>What's next?</h1>
        <p>${greeting} A few options while you're here.</p>
      </div>

      <div class="fu-grid">
        <button class="fu-card is-primary" data-act="drink">
          <span class="ic"><svg class="icon"><use href="#i-glass"/></svg></span>
          <span class="lbl">Order another drink</span>
          <span class="sub">Straight to the drinks list.</span>
        </button>

        ${callWaiterCard}

        <button class="fu-card" data-act="more">
          <span class="ic"><svg class="icon"><use href="#i-noodles"/></svg></span>
          <span class="lbl">Order more food</span>
          <span class="sub">Back to the full menu.</span>
        </button>

        <button class="fu-card is-gold" data-act="gram">
          <span class="ic"><svg class="icon"><use href="#i-camera"/></svg></span>
          <span class="lbl">#ForTheGram</span>
          <span class="sub">Tag us on socials.</span>
        </button>

        <button class="fu-card" data-act="review" data-url="${reviewURL}">
          <span class="ic"><svg class="icon"><use href="#i-star"/></svg></span>
          <span class="lbl">Leave a Google review</span>
          <span class="sub">It helps a small kitchen more than you'd think.</span>
        </button>
      </div>

      <button class="fu-fresh-link" data-act="fresh">Start a fresh order from scratch</button>
    </div>
  `;

  $$('.fu-card', root).forEach(b => {
    b.addEventListener('click', () => {
      const act = b.dataset.act;
      ga('followup_action', {action:act, mode:STATE.mode});
      if (act === 'drink' || act === 'more'){
        // Land on menu, scrolled to Drinks for "drink", default for "more"
        STATE._upsellShown = 0;
        go('menu');
        if (act === 'drink'){
          // Defer scroll until menu paints
          setTimeout(() => {
            const drinksIdx = MENU_DATA.categories.findIndex(c => /drink/i.test(c.name));
            const tgt = document.getElementById('cat-' + drinksIdx);
            if (tgt) tgt.scrollIntoView({behavior:'smooth', block:'start'});
          }, 60);
        }
      } else if (act === 'call'){
        showFollowupToast(`Your server has been notified. They'll be over shortly.`);
      } else if (act === 'codereminder'){
        if (STATE.lastOrder) go('sent', {replace:true});
        else showFollowupToast(`No recent order on file.`);
      } else if (act === 'gram'){
        go('forthegram');
      } else if (act === 'review'){
        const u = b.dataset.url;
        window.open(u, '_blank', 'noopener');
      }
    });
  });

  $('.fu-fresh-link', root).addEventListener('click', () => {
    clearVisitMarker();
    STATE._suppressFollowup = true; // prevent loop-back to followup
    STATE.cart = [];
    STATE.history = [];
    go('welcome', {replace:true});
  });
});

function showFollowupToast(msg){
  const t = document.createElement('div');
  t.className = 'fu-toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 240ms ease'; }, 2400);
  setTimeout(() => t.remove(), 2700);
}

/* ═════════════════════════════════════════════════════════════════
 * SCREEN: #ForTheGram
 * ═════════════════════════════════════════════════════════════════ */
registerScreen('forthegram', root => {
  const handle = '@thaithanipapamoa';
  const tags = ['#thaithanipapamoa','#papamoabeach','#thaifoodnz','#bopeats','#tasteofthailand'];

  root.innerHTML = `
    <div class="gram">
      <div class="gram__hero">
        <h1><span class="script">For the gram</span></h1>
        <p>Snap your meal, snap a table selfie, and tag us. We'll see it. We might even repost.</p>
      </div>

      <div class="gram__capture" id="gramCap">
        <div class="ic"><svg class="icon"><use href="#i-camera"/></svg></div>
        <div class="lbl">Take a photo</div>
        <div class="sub">Front camera or back camera. Whatever you'd post.</div>
        <input type="file" id="gramFile" accept="image/*" capture="environment">
        <button class="btn btn-gold btn-lg" id="gramOpen">Open camera</button>
      </div>

      <div class="gram__preview" id="gramPreview">
        <button class="retake" id="gramRetake">Retake</button>
        <img id="gramImg" alt="">
      </div>

      <div class="gram__tags">
        <h3>Tag us when you post</h3>
        <div class="gram__tags__row">
          <span class="gram__tag is-handle">${handle}</span>
        </div>
        <div class="gram__tags__row">
          ${tags.map(t => `<span class="gram__tag">${t}</span>`).join('')}
        </div>
        <button class="gram__copy-btn" id="gramCopy">Copy tags + handle</button>
      </div>

      <div class="gram__actions">
        <button class="gram__share" data-net="instagram">
          <span class="ic ig">${ico('i-camera')}</span>
          <span class="lbl">Share to Instagram</span>
          <span class="arr">${ico('i-arrow-right')}</span>
        </button>
        <button class="gram__share" data-net="facebook">
          <span class="ic fb">f</span>
          <span class="lbl">Share to Facebook</span>
          <span class="arr">${ico('i-arrow-right')}</span>
        </button>
        <button class="gram__share" data-net="share">
          <span class="ic sh">↗</span>
          <span class="lbl">Open share menu</span>
          <span class="arr">${ico('i-arrow-right')}</span>
        </button>
      </div>
    </div>
  `;

  let capturedFile = null;
  const $file = $('#gramFile', root);
  const $img  = $('#gramImg', root);
  const $prev = $('#gramPreview', root);
  const $cap  = $('#gramCap', root);

  $('#gramOpen', root).addEventListener('click', () => $file.click());
  $file.addEventListener('change', e => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    capturedFile = f;
    const url = URL.createObjectURL(f);
    $img.src = url;
    $prev.classList.add('is-active');
    $cap.style.display = 'none';
    ga('gram_photo_captured', {});
  });
  $('#gramRetake', root).addEventListener('click', () => {
    capturedFile = null;
    $img.src = '';
    $prev.classList.remove('is-active');
    $cap.style.display = '';
    $file.value = '';
  });

  const tagText = `${handle}\n${tags.join(' ')}`;
  $('#gramCopy', root).addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(tagText);
      showFollowupToast('Copied. Paste into your post.');
      ga('gram_copy_tags', {});
    } catch(e){
      showFollowupToast('Tap and hold to copy: ' + handle);
    }
  });

  $$('.gram__share', root).forEach(b => {
    b.addEventListener('click', async () => {
      const net = b.dataset.net;
      ga('gram_share_attempt', {net});
      const shareData = {
        title: 'Thai Thani Papamoa',
        text: `${handle} ${tags.join(' ')}`,
      };
      if (capturedFile && navigator.canShare && navigator.canShare({files:[capturedFile]})){
        shareData.files = [capturedFile];
      }
      if (net === 'instagram'){
        // iOS doesn't allow direct Instagram intent; copy tags then open IG.
        try { await navigator.clipboard.writeText(tagText); } catch(e){}
        showFollowupToast('Tags copied. Opening Instagram…');
        setTimeout(() => { window.location.href = 'instagram://camera'; }, 600);
        // fallback to web after 1s if app didn't open
        setTimeout(() => { window.open('https://www.instagram.com/thaithanipapamoa/', '_blank', 'noopener'); }, 1600);
      } else if (net === 'facebook'){
        try { await navigator.clipboard.writeText(tagText); } catch(e){}
        showFollowupToast('Tags copied. Opening Facebook…');
        window.open('https://www.facebook.com/thaithanipapamoa/', '_blank', 'noopener');
      } else {
        // Generic share
        if (navigator.share){
          try { await navigator.share(shareData); ga('gram_share_done', {net:'system'}); }
          catch(e){ /* user cancelled */ }
        } else {
          showFollowupToast('Long-press the photo to save, then post.');
        }
      }
    });
  });
});

// Expose go/back for inline onclicks
window.go = go;
window.back = back;
window.STATE = STATE;

/* ═════════════════════════════════════════════════════════════════
 * BOOT

renderCurrent();

</script>
