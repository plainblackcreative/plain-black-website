<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thai Thani Papamoa, QR Generator (staff)</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.qrserver.com">
<link href="https://fonts.googleapis.com/css2?family=Della+Respira&family=Open+Sans:wght@400;500;600;700&family=Playball&display=swap" rel="stylesheet">
<style>
:root{
  --maroon:#5b1019;
  --maroon-deep:#3d0a11;
  --gold:#c9a25a;
  --gold-bright:#e0bf7c;
  --cream:#f7f1e3;
  --cream-soft:#fbf7ec;
  --ink:#1d1410;
  --muted:#7a6a60;
  --line:#e8dec8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Open Sans',sans-serif;color:var(--ink);background:var(--cream-soft);line-height:1.5}
h1,h2,h3{font-family:'Della Respira',serif;color:var(--maroon-deep);font-weight:400}
button,input{font:inherit;color:inherit}
button{cursor:pointer;border:none}
input{padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff;font-size:14px}
input:focus{outline:none;border-color:var(--gold)}

.page-head{
  background:var(--maroon);color:#fff;
  padding:18px 22px;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:14px;
}
.page-head h1{color:#fff;font-size:1.4rem}
.page-head .crumb{font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold-bright);margin-bottom:2px}
.page-head .actions{display:flex;gap:8px;flex-wrap:wrap}
.page-head .actions button, .page-head .actions a{
  background:rgba(255,255,255,0.12);color:#fff;
  border:1px solid rgba(255,255,255,0.18);
  padding:9px 14px;border-radius:10px;
  font-size:13px;font-weight:600;text-decoration:none;
  display:inline-flex;align-items:center;gap:6px;
}
.page-head .actions button:hover, .page-head .actions a:hover{background:rgba(255,255,255,0.22)}

.controls{
  background:#fff;border-bottom:1px solid var(--line);
  padding:16px 22px;
  display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;
}
.controls .field{display:flex;flex-direction:column;gap:4px}
.controls label{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);font-weight:700}
.controls input[type="text"]{min-width:280px}
.controls input[type="number"]{width:80px}
.controls .info{margin-left:auto;font-size:13px;color:var(--muted);align-self:center;background:var(--cream);padding:8px 14px;border-radius:10px}

.grid{
  padding:22px;display:grid;
  grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
  gap:18px;max-width:1200px;margin:0 auto;
}
.qr-card{
  background:#fff;border:1px solid var(--line);
  border-radius:18px;padding:18px;
  display:flex;flex-direction:column;align-items:center;text-align:center;
  box-shadow:0 1px 2px rgba(60,30,10,0.06), 0 4px 16px rgba(60,30,10,0.06);
  position:relative;
  page-break-inside:avoid;
}
.qr-card .brand{font-family:'Playball',cursive;font-size:24px;color:var(--maroon-deep);line-height:1}
.qr-card .where{font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;margin-top:2px}
.qr-card .qr-img{width:180px;height:180px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px;margin-bottom:12px}
.qr-card .qr-img img{width:100%;height:100%;display:block}
.qr-card .table-num{
  background:var(--maroon);color:var(--gold-bright);
  border-radius:10px;padding:4px 14px;font-family:'Della Respira',serif;
  font-size:14px;letter-spacing:0.05em;margin-bottom:6px;
}
.qr-card .table-num strong{color:#fff;font-size:18px;margin-left:6px}
.qr-card .ins{font-size:11px;color:var(--muted);line-height:1.4;max-width:160px}

.toggle-group{display:inline-flex;background:var(--cream);border-radius:10px;padding:3px}
.toggle-group button{
  padding:8px 14px;background:transparent;color:var(--ink);
  border-radius:8px;font-size:13px;font-weight:600;
}
.toggle-group button.is-on{background:var(--maroon);color:#fff;box-shadow:0 2px 6px rgba(91,16,25,0.18)}

@media print{
  body{background:#fff}
  .page-head, .controls{display:none}
  .grid{padding:0;gap:8mm;grid-template-columns:repeat(3, 1fr)}
  .qr-card{
    box-shadow:none;border:1.5px dashed #999;
    padding:10mm 6mm;
  }
  .qr-card .qr-img{width:55mm;height:55mm;border:none}
  .qr-card .qr-img img{width:100%;height:100%}
  @page{margin:10mm}
}

.page-head .actions svg{width:14px;height:14px;display:inline-block;vertical-align:-2px;margin-right:2px}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="i-printer" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V3h12v6"/><rect x="3" y="9" width="18" height="9" rx="2"/><rect x="6" y="14" width="12" height="8"/></symbol>
    <symbol id="i-external" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4h6v6"/><path d="M20 4l-9 9"/><path d="M19 14v5a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h5"/></symbol>
  </defs>
</svg>

<header class="page-head">
  <div>
    <div class="crumb">Thai Thani Papamoa, staff tools</div>
    <h1>Table QR codes</h1>
  </div>
  <div class="actions">
    <button id="printBtn"><svg><use href="#i-printer"/></svg> Print all</button>
    <a href="./?t=1" target="_blank"><svg><use href="#i-external"/></svg> Open table 1</a>
    <a href="./?mode=counter" target="_blank"><svg><use href="#i-external"/></svg> Open counter</a>
  </div>
</header>

<section class="controls">
  <div class="field">
    <label>Base URL</label>
    <input type="text" id="baseUrl" value="">
  </div>
  <div class="field">
    <label>Table count</label>
    <input type="number" id="tableCount" value="16" min="1" max="80">
  </div>
  <div class="field">
    <label>Mode</label>
    <div class="toggle-group" id="modeToggle">
      <button class="is-on" data-mode="tables">Tables only</button>
      <button data-mode="tables_counter">Tables + counter</button>
      <button data-mode="counter">Counter only</button>
    </div>
  </div>
  <div class="info" id="info">Click Print all to print, or use Save as PDF.</div>
</section>

<main class="grid" id="grid"></main>

<script>
const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));

const baseInput  = $('#baseUrl');
const countInput = $('#tableCount');
const modeBtns   = $$('#modeToggle button');
const grid       = $('#grid');
const printBtn   = $('#printBtn');
const info       = $('#info');

let mode = 'tables';

// Default base URL = current path minus qr.html
function defaultBase(){
  // If we're on production this resolves to the absolute deployed URL.
  const u = new URL('./', location.href);
  return u.toString();
}
baseInput.value = defaultBase();

modeBtns.forEach(b => b.addEventListener('click', () => {
  modeBtns.forEach(x => x.classList.remove('is-on'));
  b.classList.add('is-on');
  mode = b.dataset.mode;
  render();
}));
[baseInput, countInput].forEach(el => el.addEventListener('input', render));
printBtn.addEventListener('click', () => window.print());

function qrSrc(url){
  // Free, hotlinkable, CORS-friendly QR API.
  return `https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=4&qzone=2&data=${encodeURIComponent(url)}&bgcolor=ffffff&color=5b1019`;
}

function card({label, sub, url}){
  return `
    <article class="qr-card">
      <div class="brand">Thai Thani</div>
      <div class="where">Papamoa</div>
      <div class="qr-img"><img src="${qrSrc(url)}" alt="QR for ${label}"></div>
      <div class="table-num">${label}<strong>${sub}</strong></div>
      <div class="ins">Scan to order from your seat. The kitchen sees your order, the server sees your shout.</div>
    </article>
  `;
}

function render(){
  const base = (baseInput.value || defaultBase()).replace(/\/+$/, '/');
  const n = Math.max(1, Math.min(80, parseInt(countInput.value, 10) || 1));
  const cards = [];
  if (mode === 'tables' || mode === 'tables_counter'){
    for (let i = 1; i <= n; i++){
      cards.push(card({
        label: 'Table',
        sub: i,
        url: `${base}?t=${i}`,
      }));
    }
  }
  if (mode === 'counter' || mode === 'tables_counter'){
    cards.push(card({
      label: 'Order at',
      sub: 'Counter',
      url: `${base}?mode=counter`,
    }));
  }
  grid.innerHTML = cards.join('');
  info.textContent = `${cards.length} card${cards.length===1?'':'s'} ready.  Click Print all (or Cmd-P).`;
}

render();
</script>

</body>
</html>
