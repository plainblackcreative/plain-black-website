# Keep internal strategy/spec/voice docs out of the public GitHub Pages build.
# They were served at plainblackcreative.com/docs/ (privacy leak, 2026-06-14).
# Exclude the .md files INDIVIDUALLY so the docs/*.json files stay served:
# challenge.html fetches /docs/challenge-data.json over the public path, and
# blog-library.json is non-sensitive public blog data. (brand-voice.md and
# blog-library.json are also read from the repo via the GitHub API /
# raw.githubusercontent, not the public path.)
# NOTE: a folder-level `exclude: [docs]` + `include:` was tried first, but
# Jekyll's `include` did NOT re-expose the JSONs from the excluded dir (they
# 404'd), so per-file exclude is the reliable fix. Any NEW sensitive .md added to
# docs/ must be added to this list.
exclude:
  - docs/PLAINBLACK_MASTER.md
  - docs/PLAINBLACK_BUILD_SPEC.md
  - docs/REPO_SYSTEM_PROMPT.md
  - docs/brand-voice.md
  - docs/blog-gen-handoff.md
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  # Playbook product sunset (2026-06-14): the generator source templates and
  # unshipped drafts under playbooks/ready + playbooks/future are no longer a
  # public product. Stop serving the raw token-placeholder files (they carry
  # [[BUSINESS_NAME]] placeholders + the api-proxy fetch). Salvaged + tagged as
  # archive/playbooks-2026-06-14; the generator reads them via the GitHub API,
  # not this public path, so excluding them does not break generation.
  - playbooks/ready
  - playbooks/future
