# Keep the internal docs/ folder out of the public GitHub Pages build. It holds
# internal strategy/spec/voice notes that were being served at
# plainblackcreative.com/docs/ (a privacy leak found 2026-06-14). Nothing on the
# public site needs those .md files: the blog generator reads brand-voice.md from
# the repo via the GitHub API, and blog.html reads blog-library.json via
# raw.githubusercontent, NOT the public /docs/ path. The two JSONs are re-included
# because challenge.html fetches /docs/challenge-data.json over the public path
# (blog-library.json is kept served as a harmless, non-sensitive convenience).
# Jekyll's default build-artifact excludes are re-listed so this setting does not
# accidentally re-expose them if it replaces (rather than merges) the defaults.
exclude:
  - docs
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
include:
  - docs/challenge-data.json
  - docs/blog-library.json
