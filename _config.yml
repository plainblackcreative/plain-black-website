# Keep internal/build files off the public GitHub Pages build. The docs/ folder
# (internal strategy/spec/voice .md + its data .json) has been relocated to the
# private plainblack-admin repo, so its per-file excludes are gone. If a
# sensitive docs/*.md ever returns to this repo, add it back below per-file (a
# folder-level `exclude: [docs]` + `include:` did NOT re-expose docs/*.json when
# that was tried, so per-file is the reliable fix).
exclude:
  # Dev/repo files that must never be served on the customer domain. CLAUDE.md
  # in particular named the private plainblack-admin repo + its structure.
  - CLAUDE.md
  - README.md
  - CONTRIBUTING.md
  - assets/LOGO_DARK_BASE64.txt
  - assets/LOGO_LIGHT_BASE64.txt
  - assets/plainblack_asset_pack/README.md
  # Internal build artifact: full page inventory + per-page SEO scores. Tracked
  # for the pre-push hook, but nothing on the site reads it, so don't serve it.
  - website-pages.json
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  # Playbook product sunset (2026-06-14): the generator source templates and
  # unshipped drafts under playbooks/ready + playbooks/future are no longer a
  # public product. Stop serving the raw token-placeholder files (they carry
  # [[BUSINESS_NAME]] placeholders + the api-proxy fetch). Salvaged + tagged as
  # archive/playbooks-2026-06-14; the generator reads them via the GitHub API,
  # not this public path, so excluding them does not break generation.
  - playbooks/ready
  - playbooks/future
