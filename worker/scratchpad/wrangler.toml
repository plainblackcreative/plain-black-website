name = "pb-scratchpad"
main = "src/index.js"
compatibility_date = "2024-10-01"

# KV namespace — created via:
#   wrangler kv namespace create SCRATCHPAD_KV
# then paste the returned `id` below.
[[kv_namespaces]]
binding = "SCRATCHPAD_KV"
id = "33561864089e4c618b9ec9cfef2aed40"

# Comma-separated list of allowed origins for CORS.
# Add your preview / staging origins here as needed.
[vars]
ALLOWED_ORIGINS = "https://admin.plainblackcreative.com,https://www.plainblackcreative.com,https://plainblackcreative.com,https://plainblack-admin.pages.dev,http://localhost:8765"

# Secrets (NOT in this file — set with `wrangler secret put`):
#   SCRATCHPAD_TOKEN  — long random string, the same string you'll paste
#                        into the Hub on first load.
