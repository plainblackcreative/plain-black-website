name = "pb-analytics"
main = "src/index.js"
compatibility_date = "2024-10-01"

# Comma-separated list of allowed origins for CORS.
[vars]
ALLOWED_ORIGINS = "https://admin.plainblackcreative.com,https://www.plainblackcreative.com,https://plainblackcreative.com,https://plainblack-admin.pages.dev,http://localhost:8765"

# CF account ID (the hex one, from any URL on dash.cloudflare.com after /accounts/).
# Public — fine to commit.
CF_ACCOUNT_TAG = "13e541077f6e7848ad3eb3d0cd2004c7"

# Web Analytics site tag — find at:
#   dash.cloudflare.com → Analytics & Logs → Web Analytics → your site → Manage site
# Looks like a UUID. Public — fine to commit.
CF_SITE_TAG = "64eabe41287e4eb2aaa70c82e21597c3"

# Secrets (NOT in this file — set with `wrangler secret put`):
#   CF_API_TOKEN — Cloudflare API token with `Account Analytics:Read` scope.
#                  Create at dash.cloudflare.com → My Profile → API Tokens.
