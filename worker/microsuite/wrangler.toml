name = "pb-microsuite"
main = "src/index.js"
compatibility_date = "2024-10-01"

# Shared KV namespace for per-IP rate limiting across all six endpoints.
# Created via:  npx wrangler kv namespace create MICRO_KV
[[kv_namespaces]]
binding = "MICRO_KV"
id = "eed77b8b5dde477980270cb8f4e6523c"

[vars]
ALLOWED_ORIGINS = "https://www.plainblackcreative.com,https://plainblackcreative.com,https://admin.plainblackcreative.com,https://plainblack-admin.pages.dev,http://localhost:8765,http://localhost:8766"
