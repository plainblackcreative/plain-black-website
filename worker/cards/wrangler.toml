name = "pb-cards"
main = "src/index.js"
compatibility_date = "2024-10-01"

# KV namespace — created via:
#   wrangler kv namespace create PB_CARDS_KV
# then paste the returned `id` below.
[[kv_namespaces]]
binding = "PB_CARDS_KV"
id = "53c8c63df51f47a192867ab06ac338fb"

# Comma-separated list of allowed origins for CORS.
# Add your preview / staging origins here as needed.
[vars]
ALLOWED_ORIGINS = "https://admin.plainblackcreative.com,https://www.plainblackcreative.com,https://plainblackcreative.com,https://plainblack-admin.pages.dev,http://localhost:8765,http://127.0.0.1:8765"

# Secrets (NOT in this file — set with `wrangler secret put`):
#   CARDS_TOKEN  — long random string. Paste once per browser into the Hub.
