name = "pb-braindump"
main = "src/index.js"
compatibility_date = "2024-10-01"

# KV namespace — created via:
#   wrangler kv namespace create BRAINDUMP_KV
# then paste the returned `id` below.
[[kv_namespaces]]
binding = "BRAINDUMP_KV"
id = "712dd2e037ee4202a377f2a0cd68c749"

# Comma-separated list of allowed origins for CORS.
[vars]
ALLOWED_ORIGINS = "https://admin.plainblackcreative.com,https://plainblack-admin.pages.dev,http://localhost:8765"
MODEL = "claude-haiku-4-5"
GMAIL_LABEL = "brain-dump"

# Secrets (NOT in this file — set with `wrangler secret put`):
#   BRAINDUMP_TOKEN       — long random string, paste once into the inbox UI per device.
#   ANTHROPIC_API_KEY     — same key the bot worker uses; held server-side for triage.
#   GMAIL_CLIENT_ID       — Google OAuth client id (optional, only if syncing Gmail)
#   GMAIL_CLIENT_SECRET   — Google OAuth client secret
#   GMAIL_REFRESH_TOKEN   — offline refresh token (see README for OAuth Playground steps)
